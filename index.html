<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Валерия & Стас</title>
    
    <link href="https://fonts.googleapis.com" rel="stylesheet">  

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            /* Цвет "Слоновая кость" с мягким переходом в "Шалфей" */
            background: linear-gradient(180deg, #fdfbf7 0%, #f4f1ea 100%);
            background-attachment: fixed;
            color: #5d574f; /* Мягкий серо-коричневый */
            text-align: center;
        }

        .container {
            padding: 50px 20px;
            max-width: 650px;
            margin: auto;
            animation: fadeInUp 1.5s ease-out;
        }

        h1 {
            font-family: 'Great Vibes', cursive !important;
            font-size: clamp(45px, 12vw, 85px);
            line-height: 1.1;
            margin: 0 0 15px;
            /* Нежный градиент: от цвета какао до античного золота */
            background: linear-gradient(to right, #8e7d71, #bdae9c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        p {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-style: italic;
            color: #7a7169;
            margin: 10px 0;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 20px;
            color: #8c8279; /* Приглушенный рустик-тон */
            margin-bottom: 25px;
        }

        .date {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .timer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 35px;
        }

        .block {
            background: rgba(255, 255, 255, 0.5); /* Эффект льна */
            backdrop-filter: blur(3px);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .number {
            font-size: 22px;
            font-weight: 400;
            color: #8c8279;
        }

        .photo {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            object-fit: cover;
            margin-top: 20px;
            border: 6px solid #fff;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .color {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .gallery img {
            width: 100%;
            border-radius: 4px; /* Более строгие формы для рустика */
            filter: sepia(10%) contrast(95%); /* Легкий винтажный фильтр */
        }

        .map {
            border-radius: 8px;
            overflow: hidden;
            filter: grayscale(20%) opacity(90%);
        }

        button {
            background: #a3988e; /* Оливково-бежевый */
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 400;
            transition: 0.4s;
        }

        button:hover {
            background: #8c8279;
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #e2ddd3;
        }

        canvas {
            z-index: 1;
        }
    </style>
</head>
<body>

<canvas id="petals"></canvas>

<div class="container">
    <h1>Валерия & Стас</h1>
    <p>Начинаем нашу общую историю</p>
    <div class="date">05.09.2026</div>
    
    <div class="timer">
        <div class="block"><div id="d" class="number"></div>дней</div>
        <div class="block"><div id="h" class="number"></div>часов</div>
        <div class="block"><div id="m" class="number"></div>мин</div>
        <div class="block"><div id="s" class="number"></div>сек</div>
    </div>
</div>

<div class="container">
    <h2>Дорогой гость</h2>
    <p>Мы будем счастливы разделить с вами тепло этого дня. Наша свадьба — это праздник любви в кругу самых близких.</p>
    <img class="photo" src="photo.jpg">
</div>

<div class="container">
    <h2>Палитра торжества</h2>
    <div class="colors" style="display: flex; justify-content: center; gap: 15px;">
        <div class="color" style="background:#d7d0c7"></div>
        <div class="color" style="background:#e4ddd3"></div>
        <div class="color" style="background:#c2c9c2"></div> <!-- Пыльная оливка -->
        <div class="color" style="background:#a3988e"></div>
    </div>
</div>

<div class="container">
    <h2>Подтверждение</h2>
    <form id="form">
        <input name="name" placeholder="Ваше имя" required>
        <textarea name="message" placeholder="Несколько слов для нас..."></textarea>
        <button type="submit">Отправить</button>
    </form>
</div>

<script>
    const wedding = new Date("2026-09-05T14:00:00");
    const d = document.getElementById("d"), h = document.getElementById("h"), m = document.getElementById("m"), s = document.getElementById("s");

    setInterval(() => {
        let now = new Date();
        let diff = wedding - now;
        d.innerText = Math.floor(diff / 86400000);
        h.innerText = Math.floor(diff / 3600000) % 24;
        m.innerText = Math.floor(diff / 60000) % 60;
        s.innerText = Math.floor(diff / 1000) % 60;
    }, 1000);

    const canvas = document.getElementById("petals");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let petals = [];
    for(let i=0; i<30; i++) {
        petals.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, d: Math.random()*0.5+0.2 });
    }
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(189, 174, 156, 0.3)"; /* Пыльца */
        petals.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            p.y += p.d; if(p.y > canvas.height) p.y = -10;
        });
        requestAnimationFrame(draw);
    }
    draw();
</script>

</body>
</html>
